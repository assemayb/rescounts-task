services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rescounts
      POSTGRES_PASSWORD: rescounts
      POSTGRES_DB: rescounts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rescounts -d rescounts"]
      interval: 3s
      timeout: 3s
      retries: 10
